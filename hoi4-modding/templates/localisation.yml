 # ===== 政党/领导人名称 =====
 <YourTag>_democratic_party:0 "Democratic Union Party"
 <YourTag>_fascist_party:0 "National Vanguard"
 <YourTag>_communist_party:0 "People's Revolutionary Front"
 <YourTag>_neutral_party:0 "Traditionalist Coalition"

 <YourTag>_leader_democratic:0 "President <YourLeaderName>"
 <YourTag>_leader_fascist:0 "Supreme Commander <YourLeaderName>"
 <YourTag>_leader_communist:0 "General Secretary <YourLeaderName>"

 # ===== 决议/按钮文本 =====
 <YourTag>_decision_industrial_subsidy:0 "Industrial Subsidy Program"
 <YourTag>_decision_industrial_subsidy_desc:0 "Invest §Y$50,000,000§! into our industrial sector. This will provide a temporary boost to construction speed at the cost of §Rpolitical capital§!."

 <YourTag>_decision_mobilize_reserves:0 "Mobilize Reserves"
 <YourTag>_decision_mobilize_reserves_desc:0 "Call up reservists to reinforce our standing army.\n\n§YCost:§! §R50§! Political Power\n§YEffect:§! Gain §G+10%§! Manpower in all states for 180 days."

 # ===== 科技/装备本地化 =====
 <YourTag>_tech_advanced_industry:0 "Advanced Industrial Techniques"
 <YourTag>_tech_advanced_industry_desc:0 "New production methods will revolutionize our factories, increasing output and reducing waste."

 <YourTag>_equipment_rifle_standard:0 "<YourRifleName> Standard Rifle"
 <YourTag>_equipment_rifle_short:0 "<YourRifleAbbreviation> Rifle"

 <YourTag>_tank_light_standard:0 "<YourTankName> Light Tank"
 <YourTag>_tank_light_short:0 "Lt. Tank"

 <YourTag>_fighter_standard:0 "<YourFighterName> Fighter"
 <YourTag>_fighter_short:0 "Fighter"

 # ===== 动态变量/工具提示文本 =====
 <YourTag>_dynamic_stability_tooltip:0 "Current stability: §Y[?var:stability_factor]§!"
 <YourTag>_relation_tooltip:0 "Relations with [FROM.GetName]: §Y[?FROM.opinion]§!"
 <YourTag>_war_goal_tooltip:0 "§R[ROOT.GetName]§! has a §Rwar goal§! against §Y[FROM.GetName]§!"
