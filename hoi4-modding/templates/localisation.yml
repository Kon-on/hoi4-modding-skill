 <YourTag>_military_tradition_desc:0 "Our armed forces have a long history of honor and sacrifice. This tradition inspires our troops to fight with unwavering courage.\n\n§GEffect:§!\nDivision Organization: §G+5%§!\nWar Support: §G+10%§!"

