# ╔══════════════════════════════════════════════════════════════╗
# ║  本地化文件写作规范（总结）                                   ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  1. UTF-8 with BOM 编码（最重要！）                           ║
# ║  2. 每行一条 <key>:N "text"，键名全局唯一                     ║
# ║  3. 版本号 N 通常为 0，需要覆写时用更高值                     ║
# ║  4. 行首不要有空格（YAML 缩进敏感）                           ║
# ║  5. 中文需放在 l_simp_chinese 区块                           ║
# ║  6. 英文放在 l_english 区块                                  ║
# ║  7. 键名必须与脚本中一致                                  ║
# ║  8. 颜色码 § 后跟一个字母（R/G/Y/B/W/O/H/L/P/T），§! 结束 ║
# ║  9. 文件扩展名必须为 .yml                                    ║
# ║ 10. 按功能分组（国策、事件、精神、决议等）方便查找          ║
# ╚══════════════════════════════════════════════════════════════╝

# ╔══════════════════════════════════════════════════════════════╗
# ║  常用语言文件命名（放在 localisation/ 下）                   ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  <YourMod>_l_english.yml            英文主文件               ║
# ║  <YourMod>_l_simp_chinese.yml       简体中文主文件           ║
# ║  <YourMod>_focus_l_english.yml      国策英文                 ║
# ║  <YourMod>_events_l_english.yml     事件英文                 ║
# ║  <YourMod>_ideas_l_english.yml      精神/设计商英文          ║
# ║  <YourMod>_equipment_l_english.yml  装备名称英文             ║
# ║  <YourMod>_country_l_english.yml    国家/政党名称英文        ║
# ║  中文对应文件将 l_english 替换为 l_simp_chinese               ║
# ╚══════════════════════════════════════════════════════════════╝
