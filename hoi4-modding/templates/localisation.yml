# HOI4 本地化（Localisation）模板 —— 双语 l_english + l_chinese
# 验证状态: 需要对照 vanilla 验证
# Vanilla 参考: D:/steam/steamapps/common/Hearts of Iron IV/localisation/english/countries_l_english.yml
#                D:/steam/steamapps/common/Hearts of Iron IV/localisation/simp_chinese/countries_l_simp_chinese.yml
# 设计决策: .yml 本地化文件必须使用 UTF-8 WITH BOM 编码——没有 BOM 会导致文本完全不显示。
#           本模板是 .yml 文件（非 .txt），模板覆盖 l_english 和 l_chinese 双语。
#           每个条目格式: <Key>:N "<Text>" 其中 N 为版本号（通常用 0）。
#           支持动态文本：§ 颜色码、[FROM.GetName]、[ROOT.GetName] 等变量。
#           确保在编辑器中保存为 UTF-8 with BOM！

# ╔══════════════════════════════════════════════════════════════╗
# ║  重要：此文件必须保存为 UTF-8 with BOM 编码！                ║
# ║  没有 BOM = 游戏中所有文本不显示（最常见的本地化错误）        ║
# ║  VS Code: 右下角编码 → "Save with Encoding" → UTF-8 with BOM  ║
# ║  Notepad++: 编码 → 转为 UTF-8-BOM 编码                       ║
# ╚══════════════════════════════════════════════════════════════╝

# ====================================================================
# 格式说明
# ====================================================================
# 每条本地化条目格式:
#   <LocalisationKey>:N "<Text>"
#
# N 为版本号（整数），通常用 0。高版本会覆盖低版本（用于 DLC/更新覆写）。
# 行首不留空格（YAML 敏感）。
# 注释以 # 开头，必须是行首第一个非空白字符。
#
# 特殊字符：
#   § 颜色码，如 §R红色§!、§G绿色§!、§Y黄色§!、§B蓝色§!、§W白色§!
#   \n  换行（在 tooltip 中使用）
#   [FROM.GetName]   事件发起国名称
#   [ROOT.GetName]   当前国家名称（通常为玩家所在国）
#   [GetDateText]    当前日期
#   [?var_name]      显示变量值
#   <b>bold</b>      粗体（部分支持）
#
# 颜色码速查:
#   §R 红色  §G 绿色  §Y 黄色  §B 蓝色  §W 白色  §O 橙色
#   §H 灰色  §L 浅蓝  §P 紫色  §T 浅绿  §! 结束颜色
#   §R[ROOT.GetName]§! → 以红色显示国家名


########################################
# 变体 1: l_english（英文）样本
########################################

l_english:

 # ===== 国策名称与描述 =====
 <YourTag>_focus_industrial_expansion:0 "Industrial Expansion"
 <YourTag>_focus_industrial_expansion_desc:0 "Our nation must build the factories necessary to fuel a modern war machine. §Y+2 Civilian Factories§! and §Y+1 Military Factory§! in the capital region."

 <YourTag>_focus_army_reform:0 "Reform the Army"
 <YourTag>_focus_army_reform_desc:0 "Our outdated military doctrines must be replaced with §Bmodern warfare tactics§!. This will unlock new division templates and provide a §G+10%§! attack bonus to all infantry units."

 <YourTag>_focus_diplomatic_overture:0 "Diplomatic Overture"
 <YourTag>_focus_diplomatic_overture_desc:0 "We seek to strengthen our ties with [FROM.GetName]. A mutual defense pact would deter any would-be aggressors.\n\n§YEffect:§!\nImprove relations with [FROM.GetName] by §G+50§!\n§R-25§! Political Power"

 <YourTag>_focus_territorial_claim:0 "Press Territorial Claims"
 <YourTag>_focus_territorial_claim_desc:0 "The lands of §R[FROM.GetName]§! rightfully belong to [ROOT.GetName]. We will take them—by diplomacy or by force."

 # ===== 事件标题与描述 =====
 <YourTag>.1.t:0 "The [ROOT.GetName] Congress"
 <YourTag>.1.d:0 "Today, the National Congress convenes to discuss our nation's future. The party leadership has proposed §Ya new industrial policy§! that could reshape our economy. However, opposition leaders warn of potential §Runrest§! among the working class."
 <YourTag>.1.a:0 "Adopt the new industrial policy."
 <YourTag>.1.b:0 "Seek a compromise with the opposition."
 <YourTag>.1.c:0 "The Congress is irrelevant—we rule by decree!"

 <YourTag>.2.t:0 "Diplomatic Incident with [FROM.GetName]"
 <YourTag>.2.d:0 "A border skirmish between our patrol and forces of [FROM.GetName] has escalated tensions. Our generals demand a strong response, while our diplomats urge restraint.\n\n§YCurrent Relations:§! [?FROM.opinion]"
 <YourTag>.2.a:0 "Mobilize the army. This is an act of aggression!"
 <YourTag>.2.b:0 "Negotiate a peaceful resolution."
 <YourTag>.2.c:0 "Use this incident as a pretext for §Rwar§!."

 # ===== 国家精神名称与描述 =====
 <YourTag>_industrial_potential:0 "Untapped Industrial Potential"
 <YourTag>_industrial_potential_desc:0 "Our nation possesses vast natural resources and a growing workforce. However, §Youtdated infrastructure§! and §Rcorruption§! prevent us from reaching our full industrial capacity.\n\n§GEffect:§!\nConstruction Speed: §G+5%§!\nFactory Output: §R-10%§!"

